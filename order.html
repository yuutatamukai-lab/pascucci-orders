<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>発注</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#b40000">

  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      padding: 16px;
      background: #f5f5f5;
    }

    .page-title {
      text-align: center;
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 20px;
    }

    #storeInfo {
      text-align: center;
      font-size: 18px;
      margin-bottom: 16px;
      font-weight: 600;
    }

    #categoryButtons {
      background: #b40000;
      padding: 12px;
      border-radius: 14px;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 24px;
    }

    #categoryButtons button {
      flex: 1;
      background: #222;
      color: #fff;
      border: none;
      padding: 12px;
      font-size: 14px;
      border-radius: 10px;
      cursor: pointer;
    }

    #categoryButtons button.active {
      background: #444;
      font-weight: 700;
    }

    #categoryHeader {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    #standardBtn {
      background: #ffffff;
      color: #b40000;
      border: 2px solid #b40000;
      padding: 8px 16px;
      font-size: 14px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
    }

    #submit {
      width: 100%;
      margin-top: 20px;
      padding: 18px;
      font-size: 20px;
      font-weight: 700;
      background: #b40000;
      color: #ffffff;
      border: none;
      border-radius: 12px;
      cursor: pointer;
    }

    .item-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px;
      border-bottom: 1px solid #ddd;
      background: #fff;
    }

    .item-name {
      font-size: 18px;
      font-weight: 600;
    }

    .qty-control button {
      font-size: 20px;
      padding: 10px 14px;
      border-radius: 8px;
    }

    .qty-control input {
      width: 70px;
      text-align: center;
      font-size: 20px;
      padding: 6px;
      border-radius: 6px;
      appearance: textfield;
      -moz-appearance: textfield;
    }

    /* Chrome, Safari */
    .qty-control input::-webkit-outer-spin-button,
    .qty-control input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    textarea {
      width: 100%;
      font-size: 16px;
      padding: 8px;
      margin-top: 16px;
    }

    .bottom-menu {
      margin-top: 24px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .bottom-menu button {
      flex: 1;
      padding: 12px;
      font-size: 14px;
    }

    /* ===== モバイル最適化 ===== */
    @media (max-width: 768px) {

      .page-title {
        font-size: 24px;
      }

      #storeInfo {
        font-size: 16px;
      }

      #categoryButtons button {
        font-size: 16px;
        padding: 12px;
        flex: 1 1 30%;
      }

      .item-row {
        padding: 14px 10px;
      }

      .item-name {
        font-size: 17px;
      }

      .qty-control {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .qty-control button {
        font-size: 22px;
        padding: 10px 16px;
      }

      .qty-control input {
        width: 64px;
        font-size: 20px;
      }

      #dateSelector div[style*="display:flex"] {
        flex-direction: column;
      }

      #submit {
        font-size: 22px;
        padding: 22px;
      }

      .bottom-menu {
        flex-direction: column;
      }

      .bottom-menu button {
        width: 100%;
        font-size: 16px;
        padding: 14px;
      }

      textarea {
        font-size: 16px;
      }

    }
  </style>
</head>

<body>

<h1 class="page-title">ORDERS</h1>
<div id="storeInfo"></div>

<div id="categoryHeader">
  <div style="font-weight:700; font-size:18px;">商品カテゴリ</div>
  <button id="standardBtn">Standard</button>
</div>

<div id="categoryButtons">
  <button data-category="C" class="active">Packaging</button>
  <button data-category="A">Food</button>
  <button data-category="B">Bakery / Dolce</button>
</div>

<div id="dateSelector" style="margin-top:20px;">
  <div style="font-weight:700; margin-bottom:8px;">発注日</div>
  <div style="display:flex; gap:10px;">
    <select id="yearSelect" style="flex:1; padding:14px; font-size:18px;"></select>
    <select id="monthSelect" style="flex:1; padding:14px; font-size:18px;"></select>
    <select id="daySelect" style="flex:1; padding:14px; font-size:18px;"></select>
  </div>
</div>
<div id="itemList"></div>

<div>
  <label><strong>備考：</strong></label>
  <textarea id="orderNote" rows="3"></textarea>
</div>


<button id="submit" style="width:100%; margin-top:24px; padding:22px; font-size:22px; font-weight:700; background:#b40000; color:#ffffff; border:none; border-radius:14px;">送信</button>

<div class="bottom-menu">
  <button onclick="location.href='./history.html'">発注履歴</button>
  <button id="logoutBtn">Logout</button>
</div>

<script type="module">
import { supabase, getUser, getSession, onAuthStateChange } from './supabase-client.js';

/* ===============================
   認証チェック
================================ */
const { session } = (await getSession()) || {};
if (!session) {
  location.replace("./login.html");
  throw new Error("not authenticated");
}

const user = await getUser();

// public.users テーブルから store_id と role を取得
const { data: userRow, error: userError } = await supabase
  .from("users")
  .select("store_id, role")
  .eq("id", user.id)
  .single();

if (userError || !userRow) {
  console.error("ユーザー情報取得失敗", userError);
  location.replace("./login.html");
  throw new Error("user fetch failed");
}

const STORE_ID = userRow.store_id;

// 店舗権限以外は弾く（wh は master 画面へ）
if (userRow.role === "wh") {
  location.replace("./master.html");
  throw new Error("warehouse user redirected");
}

if (!STORE_ID) {
  location.replace("./login.html");
  throw new Error("no store id");
}

/* 店舗名表示を明確化 */
const STORE_NAME_MAP = {
  store_a: "仙石山",
  store_b: "麹町",
  store_c: "西麻布"
};

const storeName = STORE_NAME_MAP[STORE_ID] || STORE_ID;
document.getElementById("storeInfo").textContent = `ログイン店舗：${storeName}`;

onAuthStateChange((event) => {
  if (event === "SIGNED_OUT" || event === "TOKEN_REFRESH_FAILED") {
    location.replace("./login.html");
  }
});

document.getElementById("logoutBtn").onclick = async () => {
  await supabase.auth.signOut();
  location.replace("./login.html");
};

// 3時間で自動ログアウト
const AUTO_LOGOUT_MS = 3 * 60 * 60 * 1000;
setTimeout(async () => {
  await supabase.auth.signOut();
  location.replace("./login.html");
}, AUTO_LOGOUT_MS);

// 店舗 × 画面カテゴリ × itemu_category 対応表
const STORE_CATEGORY_MAP = {
  store_a: {
    C: ["m"],   // Packaging
    A: ["a","b","d","e","g"],   // Food
    B: ["i","k","J"]    // Bakery / Dolce
  },
  store_b: {
    C: ["m"],
    A: ["a","b","e","f"],
    B: ["i","j","k"]
  },
  store_c: {
    C: ["m"],
    A: ["a","c","e","g"],
    B: ["i","k","J"]
  }
};

/* ===============================
   アイテムをSupabaseのitemテーブルから取得
================================ */
async function loadItems(category) {
  // 現在表示中の数量を一時保存
  const currentRows = document.querySelectorAll(".item-row");
  currentRows.forEach(row => {
    const itemId = row.dataset.itemId;
    const qty = row.querySelector(".qty")?.value;
    const itemName = row.dataset.itemName;
    const category = row.dataset.category;

    if (itemId) {
      window.__orderState = window.__orderState || {};
      window.__orderState[itemId] = {
        quantity: qty,
        item_name: itemName,
        category: category
      };
    }
  });
  const itemList = document.getElementById("itemList");
  itemList.innerHTML = "読み込み中...";

  const storeConfig = STORE_CATEGORY_MAP[STORE_ID];

  if (!storeConfig) {
    itemList.innerHTML = "店舗設定が存在しません";
    return;
  }

  const allowedItemuCategories = storeConfig[category] || [];

  if (allowedItemuCategories.length === 0) {
    itemList.innerHTML = "このカテゴリーは未設定です";
    return;
  }

  const { data, error } = await supabase
    .from("item")
    .select("id, name, category")
    .in("category", allowedItemuCategories)
    .order("category", { ascending: true })
    .order("display_order", { ascending: true, nullsLast: true })
    .order("id", { ascending: true });

  if (error) {
    itemList.innerHTML = "アイテム取得エラー";
    console.error(error);
    return;
  }

  if (!data || data.length === 0) {
    itemList.innerHTML = "このカテゴリーにアイテムがありません";
    return;
  }

  itemList.innerHTML = data.map(item => `
    <div class="item-row" data-item-id="${item.id}" data-item-name="${item.name}" data-category="${item.category}">
      <span class="item-name">${item.name}</span>
      <div class="qty-control">
        <button class="minus">−</button>
        <input type="number" class="qty" value="${(window.__orderState && window.__orderState[item.id]?.quantity) ? window.__orderState[item.id].quantity : 0}">
        <button class="plus">＋</button>
      </div>
    </div>
  `).join("");

  document.querySelectorAll(".qty-control").forEach(c => {
    const input = c.querySelector(".qty");
    c.querySelector(".plus").onclick  = () => input.value = Number(input.value) + 1;
    c.querySelector(".minus").onclick = () => input.value = Math.max(0, Number(input.value) - 1);
  });
}

/* カテゴリーボタン制御 */
document.querySelectorAll("#categoryButtons button").forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll("#categoryButtons button").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    loadItems(btn.dataset.category);
  };
});

loadItems("C");

// Standardボタン：usual_ordersから自動入力（読込専用）
document.getElementById("standardBtn").onclick = async () => {
  const activeBtn = document.querySelector("#categoryButtons button.active");
  const currentCategory = activeBtn?.dataset.category;

  if (!currentCategory) return;

  const { data, error } = await supabase
    .from("usual_orders")
    .select("item, quantity, store_id")
    .eq("store_id", STORE_ID)

  if (error) {
    console.error(error);
    alert("Standard取得エラー");
    return;
  }

  // いったん全部0に戻す
  document.querySelectorAll(".qty").forEach(input => input.value = 0);

  if (!data || data.length === 0) {
    alert("Standard登録がありません");
    return;
  }

  // usual_ordersの内容を反映
  data.forEach(order => {
    const row = document.querySelector(`.item-row[data-item-id="${order.item}"]`);
    if (row) {
      const input = row.querySelector(".qty");
      if (input) input.value = order.quantity;
    }
  });
};

/* ===============================
   発注日セレクト初期化
================================= */
const yearSelect = document.getElementById("yearSelect");
const monthSelect = document.getElementById("monthSelect");
const daySelect = document.getElementById("daySelect");

const today = new Date();
const tomorrow = new Date(today);
tomorrow.setDate(today.getDate() + 1);
const currentYear = today.getFullYear();

for (let y = currentYear - 2; y <= currentYear + 1; y++) {
  const option = document.createElement("option");
  option.value = y;
  option.textContent = y + "年";
  if (y === tomorrow.getFullYear()) option.selected = true;
  yearSelect.appendChild(option);
}

for (let m = 1; m <= 12; m++) {
  const option = document.createElement("option");
  option.value = m;
  option.textContent = m + "月";
  if (m === tomorrow.getMonth() + 1) option.selected = true;
  monthSelect.appendChild(option);
}

function updateDays() {
  const y = Number(yearSelect.value);
  const m = Number(monthSelect.value);
  const lastDay = new Date(y, m, 0).getDate();

  const currentSelected = Number(daySelect.value);

  daySelect.innerHTML = "";

  for (let d = 1; d <= lastDay; d++) {
    const option = document.createElement("option");
    option.value = d;
    option.textContent = d + "日";
    daySelect.appendChild(option);
  }

  // 以前の選択日が有効ならそれを維持、無効なら月末に合わせる
  if (currentSelected && currentSelected <= lastDay) {
    daySelect.value = currentSelected;
  } else {
    daySelect.value = lastDay;
  }
}

yearSelect.onchange = updateDays;
monthSelect.onchange = updateDays;
updateDays();
daySelect.value = tomorrow.getDate();

document.getElementById("submit").onclick = async () => {
  // 現在表示中の数量を必ずstateへ保存（最後のカテゴリー対策）
  const currentRows = document.querySelectorAll(".item-row");
  currentRows.forEach(row => {
    const itemId = row.dataset.itemId;
    const qty = row.querySelector(".qty")?.value;
    const itemName = row.dataset.itemName;
    const category = row.dataset.category;

    if (itemId) {
      window.__orderState = window.__orderState || {};
      window.__orderState[itemId] = {
        quantity: qty,
        item_name: itemName,
        category: category
      };
    }
  });
  const deliveryDate =
    `${yearSelect.value}-${String(monthSelect.value).padStart(2,'0')}-${String(daySelect.value).padStart(2,'0')}`;

  // 取得して必ず文字列で送るようにします（NOT NULL対策）
  const note = document.getElementById("orderNote").value?.trim() || "";

  // ① ヘッダー保存
  const { data, error } = await supabase
    .from("orders")
    .insert({
      delivery_date: deliveryDate,
      store_id: STORE_ID,
      store_name: storeName,
      note: note
    })
    .select('id')
    .single();

  if (error) {
    console.error("orders INSERTエラー:", error);
    alert(JSON.stringify(error));
    return;
  }

  const orderId = data.id;

  // ② 明細作成（item_idとquantityのみ保存）
  const orderItems = [];
  const state = window.__orderState || {};

  for (const itemId in state) {
    const entry = state[itemId];
    const qty = parseInt(entry?.quantity, 10);

    if (!Number.isInteger(qty) || qty <= 0) continue;

    orderItems.push({
      order_id: orderId,
      item_id: itemId,
      item_name: entry.item_name,
      category: entry.category,
      quantity: qty
    });
  }
  if (orderItems.length === 0) {
    alert("数量が入力されていません");
    return;
  }

  // ③ 明細保存
  const { error: itemError } = await supabase
    .from("order_items")
    .insert(orderItems);

  if (itemError) {
    console.error("order_items INSERTエラー:", itemError);
    alert(JSON.stringify(itemError));
    return;
  }

  alert("保存完了しました");
  location.href = "./history.html";
};
</script>
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/service-worker.js")
    .catch(err => console.error("Service Worker registration failed:", err));
}
</script>
</body>
</html>
